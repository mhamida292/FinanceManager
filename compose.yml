services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - finance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8000}:8000"

  # Production-only: TLS termination via Caddy + Cloudflare DNS-01.
  # Started only when you run `docker compose --profile prod up -d`.
  # Requires CLOUDFLARE_API_TOKEN in .env and DNS pointing finance.momajlab.com
  # at this host's tailnet IP.
  proxy:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "443:443"
      - "443:443/udp"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  finance_pgdata:
  caddy_data:
  caddy_config:
